<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Paper Registration</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --dark-grey: #0a1023;
      --light-blue: #0047ab;
      --orange: #f28500;
      --white: #ffffff;
      --light-grey: #f5f7fb;
      --border-color: #cbd5e1;
    }
    body {
      background: var(--light-grey);
      font-family: 'Raleway', sans-serif;
      color: var(--dark-grey);
    }
    .form-container {
      max-width: 900px;
      margin: 0 auto;
    }
    .form-box {
      background: var(--white);
      padding: 50px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.05);
      border-top: 6px solid var(--light-blue);
    }
    .form-header {
      text-align: center;
      margin-bottom: 40px;
    }
    .form-header h2 {
      font-weight: 800;
      color: var(--dark-grey);
    }
    .form-header p {
      color: #64748b;
      font-size: 1.05rem;
      margin-top: 8px;
    }
    .section-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--light-blue);
      margin-top: 40px;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #e2e8f0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .form-label {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--dark-grey);
      margin-bottom: 8px;
    }
    .form-control, .form-select {
      border-radius: 8px;
      padding: 12px 16px;
      border: 1px solid var(--border-color);
      background-color: #f8fafc;
      transition: all 0.3s;
      font-size: 0.95rem;
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--light-blue);
      box-shadow: 0 0 0 0.25rem rgba(0, 71, 171, 0.1);
      background-color: var(--white);
    }
    textarea.form-control {
      resize: vertical;
      min-height: 100px;
    }
    .btn-primary {
      background-color: var(--light-blue);
      border-color: var(--light-blue);
      padding: 16px;
      font-size: 1.1rem;
      font-weight: 700;
      border-radius: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      margin-top: 20px;
    }
    .btn-primary:hover {
      background-color: var(--orange);
      border-color: var(--orange);
      transform: translateY(-2px);
      box-shadow: 0 8px 15px rgba(242, 133, 0, 0.2);
    }
    /* Custom file upload */
    input[type="file"] {
      padding: 9px;
      background-color: #f8fafc;
    }
    input[type="file"]::file-selector-button {
      border: none;
      background: var(--light-blue);
      padding: 8px 16px;
      border-radius: 6px;
      color: var(--white);
      cursor: pointer;
      transition: background 0.3s ease;
      margin-right: 15px;
      font-weight: 600;
    }
    input[type="file"]::file-selector-button:hover {
      background: var(--orange);
    }
    .required-asterisk {
      color: #ef4444;
      margin-left: 3px;
    }
    #msg {
      font-size: 1.1rem;
      font-weight: 600;
    }
  </style>
</head>

<body>

<div class="container my-5 form-container">
  <div class="form-box">
    <div class="form-header">
      <h2>Paper Registration Form</h2>
      <p>Please fill out the form using your latest details</p>
    </div>

    <form id="paperForm">
      
      <div class="row g-4">
        <!-- Corresponding Author -->
        <div class="col-12">
          <h5 class="section-title mt-0">Corresponding Author Details</h5>
        </div>
        
        <div class="col-md-12">
          <label class="form-label">Full Name <span class="required-asterisk">*</span></label>
          <input class="form-control" name="fullName" placeholder="Enter full name" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Email <span class="required-asterisk">*</span></label>
          <input class="form-control" name="email" type="email" placeholder="example@domain.com" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Contact Number <span class="required-asterisk">*</span></label>
          <input class="form-control" name="contact" placeholder="+1 234 567 8900" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Affiliation <span class="required-asterisk">*</span></label>
          <input class="form-control" name="affiliation" placeholder="University / Organization" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Designation <span class="required-asterisk">*</span></label>
          <input class="form-control" name="designation" placeholder="e.g., Professor, Ph.D. Scholar" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">ORCID ID</label>
          <input class="form-control" name="orcid" placeholder="0000-0000-0000-0000">
        </div>
        <div class="col-md-6">
          <label class="form-label">Country <span class="required-asterisk">*</span></label>
          <input class="form-control" name="country" placeholder="Your Country" required>
        </div>

        <!-- Co Authors -->
        <div class="col-12">
          <h5 class="section-title">Co-Author Details</h5>
        </div>
        <div class="col-12">
          <label class="form-label">Co-Authors</label>
          <textarea class="form-control" name="coauthors" placeholder="Enter multiple co-authors (Name, Affiliation, Email) separated by commas"></textarea>
        </div>

        <!-- Paper Info -->
        <div class="col-12">
          <h5 class="section-title">Paper Information</h5>
        </div>
        <div class="col-md-8">
          <label class="form-label">Paper Title <span class="required-asterisk">*</span></label>
          <input class="form-control" name="paperTitle" placeholder="Enter your paper title" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Paper ID <span class="required-asterisk">*</span></label>
          <input class="form-control" name="paperId" placeholder="e.g., #1024" required>
        </div>
        <div class="col-12">
          <label class="form-label">Abstract <span class="required-asterisk">*</span></label>
          <textarea class="form-control" name="abstract" placeholder="Abstract (150–300 words)" required></textarea>
        </div>
        <div class="col-md-6">
          <label class="form-label">Keywords <span class="required-asterisk">*</span></label>
          <input class="form-control" name="keywords" placeholder="Enter keywords separated by commas" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Track / Theme <span class="required-asterisk">*</span></label>
          <input class="form-control" name="track" placeholder="Relevant track or theme" required>
        </div>

        <!-- Presentation -->
        <div class="col-12">
          <h5 class="section-title">Presentation Details</h5>
        </div>
        <div class="col-md-4">
          <label class="form-label">Presentation Mode <span class="required-asterisk">*</span></label>
          <select class="form-select" name="presentationMode" required>
            <option value="" disabled selected>Select Mode</option>
            <option value="Oral">Oral</option>
            <option value="Poster">Poster</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Participation Mode <span class="required-asterisk">*</span></label>
          <select class="form-select" name="participationMode" required>
            <option value="" disabled selected>Select Participation</option>
            <option value="Online">Online</option>
            <option value="Offline">Offline</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Presented By Author? <span class="required-asterisk">*</span></label>
          <select class="form-select" name="presentedByAuthor" required>
            <option value="" disabled selected>Select Option</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
          </select>
        </div>

        <!-- Registration -->
        <div class="col-12">
          <h5 class="section-title">Registration Details</h5>
        </div>
        <div class="col-md-4">
          <label class="form-label">Category <span class="required-asterisk">*</span></label>
          <select class="form-select" name="category" required>
            <option value="" disabled selected>Select Category</option>
            <option value="Student">Student</option>
            <option value="Academic">Academic</option>
            <option value="Industry">Industry</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Authors Attending <span class="required-asterisk">*</span></label>
          <input type="number" class="form-control" name="authorsAttending" placeholder="e.g., 2" required min="1">
        </div>
        <div class="col-md-4">
          <label class="form-label">Payment Status <span class="required-asterisk">*</span></label>
          <select class="form-select" name="paymentStatus" required>
            <option value="" disabled selected>Select Status</option>
            <option value="Paid">Paid</option>
            <option value="Pending">Pending</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Transaction ID <span class="required-asterisk">*</span></label>
          <input class="form-control" name="transactionId" placeholder="Enter bank transaction ID" required>
        </div>

        <!-- File Upload -->
        <div class="col-md-6">
          <label class="form-label">Payment Proof Upload <span class="required-asterisk">*</span></label>
          <input type="file" id="fileInput" class="form-control" accept=".pdf,image/*" required>
        </div>

        <!-- Submit -->
        <div class="col-12">
          <button type="submit" class="btn btn-primary w-100">Submit Registration</button>
        </div>
      </div>

    </form>

    <p id="msg" class="mt-3 text-center"></p>
  </div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbx3_-fRTJ6B8lYeZ-u77J6HR2bLkxjVc5xuiDbi7JBhmaiP7tCjASrAJYiffbFH-Bq91Q/exec"; 
const cloudName = "dxg4atpww";
const uploadPreset = "INCSTIC";

document.getElementById("paperForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const msg = document.getElementById("msg");
  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("Please upload payment proof");
    return;
  }

  try {
    msg.innerText = "Uploading file...";

    // Upload to Cloudinary
    const cloudData = new FormData();
    cloudData.append("file", file);
    cloudData.append("upload_preset", uploadPreset);

    const uploadRes = await fetch(
      `https://api.cloudinary.com/v1_1/${cloudName}/auto/upload`,
      {
        method: "POST",
        body: cloudData
        
      }
    );

    const uploadResult = await uploadRes.json();

    if (!uploadResult.secure_url) {
      throw new Error("Upload failed");
    }

    const fileURL = uploadResult.secure_url;

    // Collect form data
    const form = e.target;
    const data = Object.fromEntries(new FormData(form).entries());

    data.fileURL = fileURL;

    msg.innerText = "Submitting form...";

    // Send to Google Sheets
    await fetch(scriptURL, {
      method: "POST",
      body: JSON.stringify(data),
      mode: "no-cors",
    });

    msg.innerText = "✅ Submitted Successfully!";
    form.reset();

    // Reload the page after 5 seconds
    setTimeout(() => {
      window.location.reload();
    }, 5000);

  } catch (err) {
    console.error(err);
    msg.innerText = "❌ Error occurred!";
  }
});
</script>

</body>
</html>
